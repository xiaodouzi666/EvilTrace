    .guard { fill: #fff7ed; stroke: #c2410c; stroke-width: 1.5; rx: 6; }
    .out { fill: #ecfdf5; stroke: #047857; stroke-width: 1.5; rx: 6; }
    .line { stroke: #475569; stroke-width: 1.4; marker-end: url(#arrow); }
  </style>
  <defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/></marker></defs>
  <rect x="35" y="45" width="120" height="45" class="box"/><text x="58" y="73">Analyst CLI</text>
  <rect x="205" y="45" width="170" height="45" class="box"/><text x="225" y="73">Claude Orchestrator</text>
  <rect x="425" y="45" width="150" height="45" class="box"/><text x="448" y="73">Planner + Loop</text>
  <rect x="625" y="45" width="190" height="45" class="box"/><text x="646" y="73">Typed MCP Server</text>
  <rect x="625" y="135" width="260" height="125" class="guard"/><text x="650" y="165">Architectural Guardrails</text><text x="650" y="190">Allowlist, read-only evidence</text><text x="650" y="215">Timeouts, output caps</text><text x="650" y="240">Mandatory audit logging</text>
  <rect x="425" y="320" width="150" height="45" class="box"/><text x="450" y="348">Evidence Graph</text>
