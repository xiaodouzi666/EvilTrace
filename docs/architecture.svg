  <line x1="155" y1="68" x2="205" y2="68" class="line"/><line x1="375" y1="68" x2="425" y2="68" class="line"/><line x1="575" y1="68" x2="625" y2="68" class="line"/>
  <line x1="720" y1="90" x2="720" y2="135" class="line"/><line x1="720" y1="260" x2="500" y2="320" class="line"/><line x1="575" y1="343" x2="625" y2="343" class="line"/><line x1="775" y1="343" x2="805" y2="343" class="line"/>
  <line x1="700" y1="320" x2="510" y2="90" class="line"/><text x="515" y="205">self-correction</text>
