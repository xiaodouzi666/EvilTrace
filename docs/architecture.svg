<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="560" role="img" aria-label="EvilTrace architecture with trust boundary">
  <style>
    text { font-family: Arial, sans-serif; font-size: 13px; fill: #1f2937; }
    .box { fill: #f8fafc; stroke: #334155; stroke-width: 1.5; }
    .guard { fill: #fff7ed; stroke: #c2410c; stroke-width: 1.5; }
    .out { fill: #ecfdf5; stroke: #047857; stroke-width: 1.5; }
    .zone { fill: none; stroke-width: 1.5; stroke-dasharray: 6 4; }
    .untrusted { stroke: #b45309; }
    .trusted { stroke: #047857; }
    .zonelabel { font-size: 13px; font-weight: bold; }
    .line { stroke: #475569; stroke-width: 1.4; marker-end: url(#arrow); }
    .boundary { stroke: #b91c1c; stroke-width: 3; marker-end: url(#arrowred); }
    .blabel { fill: #b91c1c; font-weight: bold; font-size: 13px; }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/></marker>
    <marker id="arrowred" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#b91c1c"/></marker>
  </defs>

  <rect x="30" y="40" width="120" height="44" class="box"/><text x="50" y="67">Analyst / CLI</text>

  <!-- Untrusted reasoning zone -->
  <rect x="25" y="100" width="430" height="150" rx="10" class="zone untrusted"/>
  <text x="40" y="120" class="zonelabel" fill="#b45309">Untrusted reasoning zone</text>
  <rect x="45" y="135" width="180" height="44" class="box"/><text x="60" y="162">Claude / Deterministic</text>
  <rect x="45" y="190" width="180" height="44" class="box"/><text x="60" y="217">Planner + Self-Correction</text>
  <rect x="255" y="160" width="170" height="44" class="box"/><text x="275" y="187">MCP Client</text>

  <!-- Trust boundary -->
  <line x1="425" y1="182" x2="560" y2="182" class="boundary"/>
  <text x="430" y="150" class="blabel">TRUST BOUNDARY</text>
  <text x="430" y="225" class="blabel" font-size="11">typed tools only — no execute_shell</text>

  <!-- Trusted read-only evidence zone -->
  <rect x="560" y="100" width="415" height="320" rx="10" class="zone trusted"/>
  <text x="575" y="120" class="zonelabel" fill="#047857">Trusted read-only evidence zone</text>
  <rect x="575" y="135" width="200" height="44" class="box"/><text x="590" y="162">Typed MCP Server</text>
  <rect x="575" y="195" width="385" height="120" class="guard"/>
  <text x="590" y="218" font-weight="bold">Architectural Guardrails (in code)</text>
  <text x="590" y="240">Allowlist + denylist, read-only evidence paths</text>
  <text x="590" y="262">Timeouts, output caps</text>
  <text x="590" y="284">Audit log + provenance ledger</text>
  <rect x="575" y="330" width="180" height="44" class="box"/><text x="590" y="357">SIFT / DFIR tools (RO)</text>
  <rect x="775" y="330" width="185" height="44" class="box"/><text x="790" y="357">cases/ evidence (RO)</text>

  <!-- Pipeline / outputs -->
  <rect x="45" y="300" width="180" height="44" class="box"/><text x="60" y="327">Evidence Graph</text>
  <rect x="45" y="360" width="180" height="44" class="box"/><text x="60" y="387">Validation Engine</text>
  <rect x="45" y="455" width="260" height="60" class="out"/>
  <text x="60" y="480" font-weight="bold">Outputs (artifacts/)</text>
  <text x="60" y="500">findings.json, report.md, agent.jsonl, provenance.jsonl</text>

  <!-- edges -->
  <line x1="90" y1="84" x2="120" y2="135" class="line"/>
  <line x1="135" y1="179" x2="135" y2="190" class="line"/>
  <line x1="225" y1="182" x2="255" y2="182" class="line"/>
  <line x1="675" y1="179" x2="675" y2="195" class="line"/>
  <line x1="675" y1="315" x2="675" y2="330" class="line"/>
  <line x1="575" y1="330" x2="225" y2="322" class="line"/>
  <line x1="135" y1="344" x2="135" y2="360" class="line"/>
  <line x1="135" y1="234" x2="135" y2="135" class="line"/><text x="145" y="270" font-size="11">self-correction loop</text>
  <line x1="135" y1="404" x2="135" y2="455" class="line"/>
</svg>
